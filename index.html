<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pickleball Signup v1.0</title>
<style>
:root{--green:#2f855a;--lime:#d9f99d;--blue:#2563eb;--red:#dc2626;--yellow:#f59e0b;--dark:#172033;--muted:#667085;--bg:#f4f7fb;--card:#fff;--line:#e5e7eb}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--dark)}header{background:linear-gradient(135deg,#16a34a,#2563eb);color:white;padding:22px 18px;border-radius:0 0 26px 26px;box-shadow:0 8px 25px #0002}header h1{margin:0;font-size:28px}header p{margin:6px 0 0;opacity:.95}.wrap{max-width:1050px;margin:0 auto;padding:16px}.tabs{display:flex;gap:8px;position:sticky;top:0;background:var(--bg);padding:12px 0;z-index:5}.tab{border:0;border-radius:999px;padding:11px 15px;font-weight:800;background:white;color:var(--dark);box-shadow:0 2px 8px #0001}.tab.active{background:var(--dark);color:white}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 8px 20px #1018280d;margin-bottom:14px}.event{border-left:7px solid #cbd5e1}.event.ready{border-left-color:var(--red)}.event.booked{border-left-color:var(--green)}h2,h3{margin:0 0 12px}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.between{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:6px 10px;font-weight:800;font-size:13px;background:#eef2ff;color:#3730a3}.badge.red{background:#fee2e2;color:#991b1b}.badge.green{background:#dcfce7;color:#166534}.badge.yellow{background:#fef3c7;color:#92400e}.badge.gray{background:#f3f4f6;color:#374151}.badge.blue{background:#dbeafe;color:#1d4ed8}input,select,textarea{width:100%;border:1px solid #d0d5dd;border-radius:14px;padding:12px;font-size:16px;background:white}textarea{min-height:90px;resize:vertical}label{display:block;font-weight:800;margin:10px 0 6px;color:#344054}.btn{border:0;border-radius:14px;padding:12px 14px;font-weight:900;font-size:15px;background:var(--blue);color:white;cursor:pointer}.btn.secondary{background:#334155}.btn.danger{background:var(--red)}.btn.green{background:var(--green)}.btn.light{background:#eef2f7;color:#172033}.btn.full{width:100%}.muted{color:var(--muted)}.small{font-size:13px}.hidden{display:none!important}.list{display:flex;flex-direction:column;gap:8px}.person{display:flex;justify-content:space-between;align-items:center;gap:8px;background:#f8fafc;border:1px solid var(--line);border-radius:14px;padding:10px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}.day{min-height:54px;background:white;border:1px solid var(--line);border-radius:14px;padding:7px;font-weight:800;position:relative}.dot{position:absolute;right:7px;bottom:7px;width:11px;height:11px;border-radius:50%;background:var(--red)}.dot.green{background:var(--green)}.pill{display:inline-block;padding:5px 9px;border-radius:999px;background:#f1f5f9;margin:3px 3px 0 0;font-size:13px}.notice{background:#ecfeff;border:1px solid #a5f3fc;border-radius:16px;padding:12px;color:#155e75}.paybox{background:#f8fafc;border:1px dashed #94a3b8;border-radius:16px;padding:12px}.footer{padding:30px;text-align:center;color:#667085}.passwordWrap{position:relative}.passwordWrap button{position:absolute;right:8px;top:8px;border:0;border-radius:10px;padding:6px 10px;background:#e2e8f0;font-weight:800}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:640px){.two{grid-template-columns:1fr}.tabs{overflow-x:auto}.tab{white-space:nowrap}header h1{font-size:24px}}
</style>
</head>
<body>
<header><div class="wrap"><h1>🏓 Pickleball Signup v1.0</h1><p>Players sign up as Interested or Playing. Coordinator manages events, booking, locations, fees, and players.</p></div></header>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="showTab('player')">Player</button>
    <button class="tab" onclick="showTab('calendar')">Calendar</button>
    <button class="tab" onclick="showTab('coord')">Coordinator</button>
  </div>

  <section id="playerTab"></section>
  <section id="calendarTab" class="hidden"></section>
  <section id="coordTab" class="hidden"></section>
</div>
<div class="footer">Local demo storage only. For real shared live data, connect this to Firebase/Supabase later.</div>
<script>
const MIN_PLAYERS=6;
const defaultState={
  coordPassword:'pickleball123',
  locations:['DinkHouse','Liberty Park','Cerritos Courts','Deforest Park'],
  currentUser:null,
  users:{},
  events:[
    {id:id(),date:'2026-07-09',start:'19:00',end:'21:00',location:'DinkHouse',title:'Evening Pickleball',booked:false,details:'Waiting until minimum 6 players before booking court.',cutoff:'2',feeOn:true,fee:'5',payment:'Venmo @MarkJuliano or cash',signups:[
      {id:id(),email:'mark@example.com',name:'Mark',type:'playing',family:''},
      {id:id(),email:'ana@example.com',name:'Ana',type:'playing',family:''},
      {id:id(),email:'john@example.com',name:'John',type:'playing',family:''},
      {id:id(),email:'mia@example.com',name:'Mia',type:'interested',family:''}
    ]}
  ]
};
let state=load();
let coordAuthed=false;
let editingEventId=null;
function id(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}
function load(){try{return JSON.parse(localStorage.getItem('pickleSignupV1'))||defaultState}catch{return defaultState}}
function save(){localStorage.setItem('pickleSignupV1',JSON.stringify(state));render()}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric',year:'numeric'})}
function fmtTime(t){let [h,m]=t.split(':');let d=new Date();d.setHours(+h,+m);return d.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}
function playerCount(e){return e.signups.filter(s=>s.type==='playing').length}
function interestedCount(e){return e.signups.filter(s=>s.type==='interested').length}
function statusBadge(e){if(e.booked)return '<span class="badge green">✅ BOOKED</span>'; if(playerCount(e)>=MIN_PLAYERS)return '<span class="badge red">🔴 Minimum reached</span>'; return '<span class="badge yellow">⏳ Waiting</span>'}
function isClosed(e){ if(e.cutoff==='open')return false; const eventStart=new Date(e.date+'T'+e.start); const hrs=Number(e.cutoff||0); return Date.now()>eventStart.getTime()-hrs*3600000; }
function showTab(t){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active')); document.querySelectorAll('section').forEach(s=>s.classList.add('hidden')); if(t==='player'){playerTab.classList.remove('hidden');document.querySelectorAll('.tab')[0].classList.add('active')} if(t==='calendar'){calendarTab.classList.remove('hidden');document.querySelectorAll('.tab')[1].classList.add('active')} if(t==='coord'){coordTab.classList.remove('hidden');document.querySelectorAll('.tab')[2].classList.add('active')} render()}
function loginBox(){if(state.currentUser){let u=state.users[state.currentUser];return `<div class="card"><div class="between"><div><b>Logged in:</b> ${u.name}<br><span class="muted small">${u.email}</span></div><button class="btn light" onclick="logout()">Logout</button></div></div>`}
return `<div class="card"><h2>Player Login / Create Account</h2><p class="muted">First time? Enter email, name, and create your password.</p><label>Email</label><input id="pEmail" type="email" placeholder="name@email.com"><label>Name</label><input id="pName" placeholder="Your name"><label>Password</label><div class="passwordWrap"><input id="pPass" type="password" placeholder="Password"><button onclick="togglePass('pPass')">Show</button></div><button class="btn full" onclick="playerLogin()">Login / Create Account</button></div>`}
function playerLogin(){let email=pEmail.value.trim().toLowerCase(), name=pName.value.trim(), pass=pPass.value; if(!email||!pass){alert('Enter email and password');return} if(state.users[email]){if(state.users[email].password!==pass){alert('Wrong password');return}} else {if(!name){alert('Enter name for new account');return} state.users[email]={email,name,password:pass,family:[]}} state.currentUser=email; save()}
function logout(){state.currentUser=null;save()}
function togglePass(idv){let el=document.getElementById(idv); el.type=el.type==='password'?'text':'password'}
function renderPlayer(){let html=loginBox(); html+=`<div class="card"><h2>Available Play Dates</h2><p class="muted">Red indicator means 6+ playing. Green means coordinator marked court as booked.</p></div>`; state.events.sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start)).forEach(e=>{const mine=state.currentUser?e.signups.filter(s=>s.email===state.currentUser):[]; html+=`<div class="card event ${e.booked?'booked':playerCount(e)>=MIN_PLAYERS?'ready':''}"><div class="between"><div><h2>${fmtDate(e.date)}</h2><div class="muted">${fmtTime(e.start)} - ${fmtTime(e.end)}</div><div><b>📍 ${e.location}</b></div></div><div>${statusBadge(e)}</div></div><div class="row" style="margin:10px 0"><span class="badge blue">✅ ${playerCount(e)} Playing</span><span class="badge gray">👍 ${interestedCount(e)} Interested</span></div>${e.booked?`<div class="notice"><b>📢 Booking Details</b><br>${escapeHtml(e.details||'No details yet.')}</div>`:`<div class="notice"><b>Waiting for court reservation.</b><br>${escapeHtml(e.details||'Coordinator has not added details yet.')}</div>`}${e.feeOn?`<div class="paybox" style="margin-top:10px"><b>💵 Court Fee:</b> $${e.fee||'0'}<br><b>Payment:</b> ${escapeHtml(e.payment||'See coordinator')}</div>`:''}<h3 style="margin-top:14px">Who’s Coming</h3>${peopleList(e,false)}${state.currentUser?signupControls(e,mine):'<p class="muted">Login to sign up.</p>'}</div>`}); playerTab.innerHTML=html}
function signupControls(e,mine){if(isClosed(e))return '<p class="badge gray">Signup closed</p>'; let editing=mine.map(s=>`<div class="person"><span>${s.family?'Child: ':''}${s.name} — <b>${s.type}</b></span><span><button class="btn light" onclick="editSignupPrompt('${e.id}','${s.id}')">Edit</button></span></div>`).join(''); return `<div style="margin-top:12px">${editing}<label>Sign up name</label><input id="name_${e.id}" placeholder="Your name or child name"><label>Signup for</label><select id="family_${e.id}"><option value="self">Myself</option><option value="child">My child/family member</option></select><label>Status</label><select id="type_${e.id}"><option value="playing">I'm Playing</option><option value="interested">I'm Interested</option></select><button class="btn green full" onclick="addSignup('${e.id}')">Sign Up</button></div>`}
function addSignup(eid){let e=state.events.find(x=>x.id===eid), u=state.users[state.currentUser]; let nm=document.getElementById('name_'+eid).value.trim()||u.name; let fam=document.getElementById('family_'+eid).value==='child'?'child':''; let typ=document.getElementById('type_'+eid).value; e.signups.push({id:id(),email:u.email,name:nm,type:typ,family:fam}); save()}
function editSignupPrompt(eid,sid){let e=state.events.find(x=>x.id===eid), s=e.signups.find(x=>x.id===sid); if(!s||s.email!==state.currentUser)return; let n=prompt('Name:',s.name); if(n===null)return; let t=prompt('Type: playing or interested',s.type); if(t!=='playing'&&t!=='interested')return alert('Use playing or interested'); s.name=n.trim()||s.name; s.type=t; save()}
function peopleList(e,admin){if(!e.signups.length)return '<p class="muted">No signups yet.</p>'; return `<div class="list">`+e.signups.map(s=>`<div class="person"><span>${s.type==='playing'?'✅':'👍'} <b>${escapeHtml(s.name)}</b> <span class="muted small">${s.family?'child/family • ':''}${s.type}</span></span>${admin?`<button class="btn danger" onclick="removeSignup('${e.id}','${s.id}')">Remove</button>`:''}</div>`).join('')+`</div>`}
function renderCalendar(){let now=new Date(); let y=now.getFullYear(), m=now.getMonth(); let first=new Date(y,m,1), last=new Date(y,m+1,0); let html=`<div class="card"><h2>${now.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</h2><div class="calendar">`; ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>html+=`<div class="muted small" style="text-align:center;font-weight:900">${d}</div>`); for(let i=0;i<first.getDay();i++)html+='<div></div>'; for(let d=1;d<=last.getDate();d++){let ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; let evs=state.events.filter(e=>e.date===ds); let booked=evs.some(e=>e.booked), ready=evs.some(e=>playerCount(e)>=MIN_PLAYERS); html+=`<div class="day">${d}${booked?'<span class="dot green"></span>':ready?'<span class="dot"></span>':''}</div>`} html+='</div><p class="muted small">🔴 6+ players. 🟢 Booked by coordinator.</p></div>'; calendarTab.innerHTML=html}
function renderCoord(){if(!coordAuthed){coordTab.innerHTML=`<div class="card"><h2>Coordinator Login</h2><label>Password</label><div class="passwordWrap"><input id="coordPass" type="password" placeholder="Coordinator password"><button onclick="togglePass('coordPass')">Show</button></div><button class="btn full" onclick="coordLogin()">Login</button><p class="muted small">Default password: pickleball123</p></div>`;return} let html=`<div class="grid"><div class="card"><h2>${editingEventId?'Edit Event':'Create Event'}</h2>${eventForm()}</div><div class="card"><h2>Coordinator Settings</h2><h3>Change Password</h3><input id="newCoordPass" type="text" placeholder="New coordinator password"><button class="btn secondary full" onclick="changeCoordPass()">Save Password</button><h3 style="margin-top:16px">Manage Locations</h3><div class="list">${state.locations.map((l,i)=>`<div class="person"><span>${escapeHtml(l)}</span><span><button class="btn light" onclick="editLoc(${i})">Edit</button> <button class="btn danger" onclick="delLoc(${i})">Delete</button></span></div>`).join('')}</div><div class="row"><input id="newLoc" placeholder="Add location"><button class="btn green" onclick="addLoc()">Add</button></div><button class="btn light full" onclick="resetDemo()" style="margin-top:12px">Reset Demo Data</button></div></div><div class="card"><h2>Dashboard</h2><div class="grid">`; state.events.forEach(e=>html+=`<div class="card event ${e.booked?'booked':playerCount(e)>=MIN_PLAYERS?'ready':''}"><div class="between"><div><h3>${fmtDate(e.date)}</h3><b>${e.location}</b><br><span class="muted">${fmtTime(e.start)} - ${fmtTime(e.end)}</span></div>${statusBadge(e)}</div><div class="row"><span class="badge blue">${playerCount(e)} Playing</span><span class="badge gray">${interestedCount(e)} Interested</span></div><p class="muted small">${escapeHtml(e.details||'No details')}</p><div class="row"><button class="btn secondary" onclick="editEvent('${e.id}')">Edit</button><button class="btn danger" onclick="deleteEvent('${e.id}')">Delete</button><button class="btn light" onclick="exportCSV('${e.id}')">CSV</button></div><h3 style="margin-top:12px">Players</h3>${peopleList(e,true)}</div>`); html+='</div></div>'; coordTab.innerHTML=html}
function eventForm(){let e=editingEventId?state.events.find(x=>x.id===editingEventId):{date:'',start:'19:00',end:'21:00',location:state.locations[0],title:'',booked:false,details:'',cutoff:'2',feeOn:false,fee:'5',payment:''}; return `<label>Title</label><input id="evTitle" value="${escAttr(e.title||'')}"><div class="two"><div><label>Date</label><input id="evDate" type="date" value="${e.date||''}"></div><div><label>Location</label><select id="evLoc">${state.locations.map(l=>`<option ${l===e.location?'selected':''}>${escapeHtml(l)}</option>`).join('')}</select></div><div><label>Start Time</label><input id="evStart" type="time" value="${e.start||'19:00'}"></div><div><label>Finish Time</label><input id="evEnd" type="time" value="${e.end||'21:00'}"></div></div><label>Signup closes</label><select id="evCutoff"><option value="open" ${e.cutoff==='open'?'selected':''}>Keep open until event starts</option><option value="1" ${e.cutoff==='1'?'selected':''}>1 hour before</option><option value="2" ${e.cutoff==='2'?'selected':''}>2 hours before</option><option value="4" ${e.cutoff==='4'?'selected':''}>4 hours before</option></select><label><input id="evBooked" type="checkbox" ${e.booked?'checked':''} style="width:auto"> Court Booked</label><label>Booking Details / Notes</label><textarea id="evDetails">${escapeHtml(e.details||'')}</textarea><label><input id="evFeeOn" type="checkbox" ${e.feeOn?'checked':''} style="width:auto"> Collect Court Fee</label><div class="two"><div><label>Fee Amount</label><input id="evFee" value="${escAttr(e.fee||'')}"></div><div><label>Payment Info</label><input id="evPay" value="${escAttr(e.payment||'')}"></div></div><div class="row" style="margin-top:12px"><button class="btn green" onclick="saveEvent()">${editingEventId?'Save Changes':'Create Event'}</button>${editingEventId?'<button class="btn light" onclick="editingEventId=null;render()">Cancel</button>':''}</div>`}
function coordLogin(){if(coordPass.value===state.coordPassword){coordAuthed=true;render()}else alert('Wrong coordinator password')}
function changeCoordPass(){let v=newCoordPass.value.trim(); if(!v)return alert('Enter new password'); state.coordPassword=v; alert('Password changed'); save()}
function saveEvent(){let e=editingEventId?state.events.find(x=>x.id===editingEventId):{id:id(),signups:[]}; Object.assign(e,{title:evTitle.value,date:evDate.value,start:evStart.value,end:evEnd.value,location:evLoc.value,cutoff:evCutoff.value,booked:evBooked.checked,details:evDetails.value,feeOn:evFeeOn.checked,fee:evFee.value,payment:evPay.value}); if(!e.date)return alert('Choose date'); if(!editingEventId)state.events.push(e); editingEventId=null; save()}
function editEvent(eid){editingEventId=eid;render();window.scrollTo({top:0,behavior:'smooth'})}
function deleteEvent(eid){if(confirm('Delete this event?')){state.events=state.events.filter(e=>e.id!==eid);save()}}
function removeSignup(eid,sid){let e=state.events.find(x=>x.id===eid); e.signups=e.signups.filter(s=>s.id!==sid); save()}
function addLoc(){let v=newLoc.value.trim(); if(v&&!state.locations.includes(v)){state.locations.push(v);save()}}
function editLoc(i){let v=prompt('Edit location',state.locations[i]); if(v){let old=state.locations[i]; state.locations[i]=v; state.events.forEach(e=>{if(e.location===old)e.location=v}); save()}}
function delLoc(i){if(confirm('Delete location?')){state.locations.splice(i,1);save()}}
function exportCSV(eid){let e=state.events.find(x=>x.id===eid); let rows=['Name,Email,Status,Family']; e.signups.forEach(s=>rows.push(`"${s.name}","${s.email}","${s.type}","${s.family}"`)); let blob=new Blob([rows.join('\n')],{type:'text/csv'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='pickleball-signups.csv'; a.click()}
function resetDemo(){if(confirm('Reset all demo data?')){localStorage.removeItem('pickleSignupV1');state=structuredClone(defaultState);coordAuthed=false;save()}}
function render(){renderPlayer();renderCalendar();renderCoord()}
function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function escAttr(s){return escapeHtml(s).replace(/"/g,'&quot;')}
render();
</script>
</body>
</html>
